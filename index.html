<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TeVue</title>
<style>
:root{--bg:#05070d;--txt:#eef2f7;--sub:#9aa4b2;--blue:#2f81f7;--glass:rgba(18,22,33,.62);--line:rgba(255,255,255,.10)}
*{box-sizing:border-box;-webkit-touch-callout:none}html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
button{font-family:inherit}
/* 롱프레스 이미지 저장/드래그 콜아웃 차단 */
img{-webkit-user-drag:none;-webkit-touch-callout:none;pointer-events:none}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:none;z-index:5}

/* ── 분할(2디스플레이 좌우 합성) ── */
#splitwrap{position:fixed;inset:0;z-index:6;display:none;background:#000}
#splitwrap.show{display:flex}
.spv{height:100%;background:#000;object-fit:contain;display:block}
#sdiv{flex:0 0 auto;width:16px;background:linear-gradient(180deg,rgba(47,129,247,.25),rgba(47,129,247,.6),rgba(47,129,247,.25));display:flex;align-items:center;justify-content:center;cursor:ew-resize;touch-action:none;z-index:7}
#sdiv::after{content:"";width:4px;height:46px;border-radius:3px;background:rgba(255,255,255,.85)}

/* ── 연결 패널 ── */
#panel{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;background:radial-gradient(120% 90% at 50% 0%,#15173a,#05070d 70%)}
#panel.hidden{display:none}
h1{font-size:48px;font-weight:800;margin:0;letter-spacing:-1px}h1 .v{color:var(--blue);text-shadow:0 0 26px rgba(47,129,247,.7)}
.hint{color:var(--sub);font-size:15px;line-height:1.5}
.dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);margin:0 3px;opacity:.3;animation:b 1.4s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,100%{opacity:.25}50%{opacity:1}}

/* ── 홈(데스크톱) ── */
#desktop{position:fixed;inset:0;z-index:8;display:none;background:linear-gradient(160deg,#10122e 0%,#241a4d 40%,#3d2a7a 75%,#5a34b0 100%)}
#desktop.show{display:block}
#desktop::after{content:"";position:absolute;left:0;right:0;bottom:0;height:46%;background:radial-gradient(120% 100% at 50% 120%,rgba(124,58,237,.5),transparent 72%);pointer-events:none}
#hometop{position:absolute;top:26px;left:48px;z-index:2}
#homeclock{font-size:56px;font-weight:800;line-height:1;letter-spacing:-1px}
#homedate{color:rgba(255,255,255,.7);font-size:16px;margin-top:6px;font-weight:600}
/* 홈 그리드(사용자 배치) */
#homegrid{position:absolute;left:0;right:0;top:150px;bottom:150px;display:flex;flex-wrap:wrap;gap:24px 28px;align-content:flex-start;justify-content:flex-start;padding:18px 48px 0;overflow-y:auto;overflow-x:hidden;z-index:2}
#homehint{position:absolute;left:0;right:0;top:42%;text-align:center;color:rgba(255,255,255,.55);font-size:16px;z-index:1;pointer-events:none}
.htile{width:104px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;position:relative;touch-action:none}
.htile .ic{width:70px;height:70px;border-radius:20px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.4);object-fit:cover;display:flex;align-items:center;justify-content:center;overflow:hidden}
.htile .ic img{width:100%;height:100%;object-fit:cover}
.htile .ic.ph{background:rgba(255,255,255,.12);font-size:30px;color:#fff}
/* 분할(합쳐진) 아이콘 = 두 앱 좌우 */
.htile .ic.split{background:linear-gradient(135deg,#1b2342,#2a2150);padding:0;gap:0}
.htile .ic.split img{width:50%;height:100%;object-fit:cover}
.htile .nm{color:#fff;font-size:13px;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.5);max-width:104px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.htile:active{transform:scale(.92)}
.htile.merge .ic{outline:3px solid var(--blue);outline-offset:3px}
/* 인라인 SVG 아이콘 사이즈(테슬라서 유니코드 글리프 깨짐 → SVG로 대체) */
.tbtn svg{width:26px;height:26px}
#menufab svg{width:28px;height:28px}
.ic.ph svg{width:54%;height:54%;opacity:.5;stroke:#fff}
#trash svg{width:22px;height:22px;vertical-align:-4px;margin-right:6px}
.del svg{width:20px;height:20px}
.thumb svg{width:46px;height:46px;opacity:.5;stroke:#fff}
#desktop.edit .htile{animation:wig .3s infinite}
@keyframes wig{0%,100%{transform:rotate(-1.6deg)}50%{transform:rotate(1.6deg)}}
#desktop.edit .htile .del{display:flex}
.htile .del{display:none;position:absolute;top:-12px;right:-6px;width:34px;height:34px;border-radius:50%;background:#f85149;color:#fff;align-items:center;justify-content:center;font-size:20px;font-weight:700;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.25)}


/* 전체 앱 서랍 그리드 */
#appsearch{display:block;margin:0 auto 18px;width:min(420px,80vw);font-size:16px;padding:10px 16px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;text-align:center}
#drawerGrid{display:flex;flex-wrap:wrap;gap:20px 24px;justify-content:center;align-content:flex-start;overflow-y:auto;max-height:calc(100% - 60px);padding-bottom:20px}
.dapp{width:96px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;touch-action:none}
.dapp .ic{width:64px;height:64px;border-radius:18px;background:#fff;object-fit:cover;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(0,0,0,.4)}
.dapp .ic img{width:100%;height:100%;object-fit:cover}
.dapp .ic.ph{background:rgba(255,255,255,.12);font-size:26px;color:#fff}
.dapp .nm{color:#fff;font-size:12px;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dapp:active{transform:scale(.92)}

/* 드래그 고스트 / 휴지통 */
.ghost{position:fixed;z-index:50;width:84px;pointer-events:none;transform:translate(-50%,-50%);opacity:.92;display:flex;flex-direction:column;align-items:center;gap:6px}
.ghost .ic{width:70px;height:70px;border-radius:20px;background:#fff;object-fit:cover;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px rgba(0,0,0,.6)}
.ghost .ic img{width:100%;height:100%;object-fit:cover}
.ghost .ic.split img{width:50%;height:100%}
.ghost .nm{color:#fff;font-size:12px}
#trash{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:49;display:none;align-items:center;gap:10px;background:rgba(248,81,73,.18);border:1.5px solid #f85149;color:#ffd7d4;border-radius:18px;padding:12px 26px;font-size:16px;font-weight:600}
#trash.show{display:flex}
#trash.hot{background:#f85149;color:#fff;transform:translateX(-50%) scale(1.08)}

/* ── 작업표시줄(앱/분할 실행 중) ── */
#taskbar{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:30;display:none;align-items:center;gap:6px;
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:20px;padding:8px 12px;box-shadow:0 10px 30px rgba(0,0,0,.45)}
#taskbar.show{display:flex}
.tbtn{width:50px;height:50px;border-radius:14px;border:0;background:rgba(255,255,255,.08);color:#fff;font-size:21px;display:flex;align-items:center;justify-content:center}
.tbtn:active{background:rgba(255,255,255,.2)}
#tbsep{width:1px;height:30px;background:var(--line);margin:0 4px}
#tbinfo{display:flex;flex-direction:column;align-items:flex-end;padding:0 8px 0 4px;min-width:64px}
#tbclock{font-size:16px;font-weight:700;line-height:1.1}
#tbconn{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;margin-top:2px}
#tbdot{width:7px;height:7px;border-radius:50%;background:#2ea043}
/* 우하단 반투명 메뉴 버튼(FAB) — 탭하면 하단 메뉴(작업표시줄) 표시 */
#menufab{position:fixed;right:20px;bottom:20px;z-index:45;width:58px;height:58px;border-radius:50%;display:none;align-items:center;justify-content:center;
  background:rgba(20,26,40,.62);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.35);
  color:#fff;font-size:26px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.55)}
#menufab.show{display:flex}
#menufab:active{background:rgba(47,129,247,.75)}

/* ── 최근앱 전환기 ── */
.sheet{position:fixed;inset:0;z-index:40;display:none;background:rgba(6,8,14,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:40px 36px 110px}
.sheet.show{display:block}
.sheettitle{color:#fff;font-size:20px;font-weight:700;text-align:center;margin-bottom:22px}
#switchGrid{display:flex;flex-wrap:wrap;gap:22px 26px;justify-content:center;align-content:flex-start;overflow-y:auto;max-height:100%}
.card{width:150px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.card .thumb{width:150px;height:90px;border-radius:14px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.card .thumb img{width:50px;height:50px;border-radius:14px}
.card .nm{color:#fff;font-size:13px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sheetclose{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:41;background:rgba(255,255,255,.16);border:0;color:#fff;border-radius:24px;padding:12px 36px;font-size:16px}

/* ── 보조(코드/보정) ── */
#status{position:fixed;top:8px;left:8px;z-index:55;background:rgba(13,17,23,.5);border-radius:8px;padding:4px 9px;font-size:10px;color:var(--sub);font-family:ui-monospace,monospace;display:none}
#changecode,#calibrate{position:fixed;top:10px;z-index:55;background:rgba(13,17,23,.6);border:1px solid #30363d;border-radius:8px;padding:6px 12px;font-size:12px;color:var(--sub);display:none}
#changecode{right:10px}#calibrate{right:104px}
#calbox{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#calbox.show{display:flex}
#calmsg{color:#eef2f7;font-size:22px;text-align:center;line-height:1.5;white-space:pre-line}
#calcancel{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 20px;color:#eef2f7;font-size:14px}
.caldot{position:fixed;width:46px;height:46px;border:3px solid var(--blue);border-radius:50%;transform:translate(-50%,-50%);z-index:71;pointer-events:none;box-shadow:0 0 12px var(--blue)}
</style></head>
<body oncontextmenu="return false">
<video id="video" autoplay playsinline></video>

<!-- 분할(좌우 합성) -->
<div id="splitwrap"><video id="vidL" class="spv" autoplay playsinline></video><div id="sdiv"></div><video id="vidR" class="spv" autoplay playsinline></video></div>

<div id="status">시작</div>

  <input id="appsearch" placeholder="앱 검색…" autocomplete="off"/>

<!-- 앱 전환기(최근앱) -->
<div id="switcher" class="sheet"><div class="sheettitle">최근 앱</div><div id="switchGrid"></div>
  <button id="switchClose" class="sheetclose">닫기</button></div>

<!-- 작업표시줄 -->
<div id="taskbar">
  <button class="tbtn" id="tbHome" title="홈"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg></button>
  <button class="tbtn" id="tbBack" title="뒤로"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
  <button class="tbtn" id="tbRecent" title="최근앱"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="2.5"/></svg></button>
  <div id="tbsep"></div>
  <div id="tbinfo"><div id="tbclock"></div><div id="tbconn"><span id="tbdot"></span><span id="tbqual">—</span></div></div>
</div>
<!-- 우하단 반투명 메뉴 버튼 → 탭하면 하단 작업표시줄 표시 -->
<div id="menufab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></div>

<!-- 연결 패널 -->
<div id="panel">
  <h1>Te<span class="v">V</span>ue</h1>
  <div class="hint" id="msg">폰과 연결 중…</div>

  <div id="codebox" style="display:none;margin-top:6px">

    <input id="codeinput" maxlength="4" autocapitalize="characters" autocomplete="off"
      style="font-size:30px;letter-spacing:8px;text-align:center;width:180px;padding:10px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:#eef2f7;text-transform:uppercase"/>
    <div><button id="codebtn"
      style="margin-top:14px;font-size:18px;padding:10px 28px;border-radius:10px;border:0;background:#2f81f7;color:#fff;font-weight:700">연결</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB_URL='https://dvxnsmoneibdwzegualm.supabase.co';
var SB_KEY='sb_publishable_a6gOpIV7KMr7KWkcuzn1eQ_CQoJ7k5W';
var $=function(i){return document.getElementById(i)};
function st(t){$('status').textContent=t}
// 앱 아이콘 없을 때 플레이스홀더(테슬라서 ▦ 글리프 깨짐 → SVG)
var PH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M5 16l4-4 3 3 3-3 4 4"/><circle cx="9.5" cy="9.5" r="1.4" fill="currentColor" stroke="none"/></svg>';
var pc=null,channel=null,sb=null,apps=[],connected=false,ctrlDc=null;
var ICE=[]; // host(로컬) 후보만 — 같은 망에서만 연결(영상 데이터 0)
var dispW=0,dispH=0; // 단일/좌 디스플레이 픽셀(터치 좌표)
var splitDisp=[null,null]; // 분할 좌/우 디스플레이 픽셀 {w,h}
var cal=null; // 화면 보정 rect{x,y,w,h}
var recents=[]; // 우리가 띄운 앱(pkg) 최근순
function send(ev,p){if(channel)channel.send({type:'broadcast',event:ev,payload:p})}
function iconSrc(ic){return ic?(ic.indexOf('data:')===0?ic:'data:image/png;base64,'+ic):''}
function appByPkg(p){for(var i=0;i<apps.length;i++)if(apps[i].pkg===p)return apps[i];return null;}

// ── 시계 ──
function two(n){return (''+n).padStart(2,'0')}
function clock(){var d=new Date();var hm=two(d.getHours())+':'+two(d.getMinutes());$('homeclock').textContent=hm;$('tbclock').textContent=hm;
  var wd=['일','월','화','수','목','금','토'][d.getDay()];$('homedate').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+wd+')';}

// ── 홈 배치 모델(localStorage) ──
// home = [{t:'a',pkg} | {t:'s',l,r}]
var home=[];
function homeKey(){return 'tevue_home_'+(curCode||'')}
function loadHome(){try{var s=localStorage.getItem(homeKey());home=s?JSON.parse(s):[];}catch(_){home=[];}}
function saveHome(){try{localStorage.setItem(homeKey(),JSON.stringify(home));}catch(_){}}

// 아이콘 내부 HTML
function appIcHtml(pkg){var a=appByPkg(pkg);var ic=a?iconSrc(a.icon):'';return ic?'<img src="'+ic+'"/>':PH;}
function tileIcHtml(item){
  if(item.t==='s')return '<div class="ic split"><img src="'+(appByPkg(item.l)&&iconSrc(appByPkg(item.l).icon)||'')+'"/><img src="'+(appByPkg(item.r)&&iconSrc(appByPkg(item.r).icon)||'')+'"/></div>';
  var a=appByPkg(item.pkg);var ic=a?iconSrc(a.icon):'';
  return ic?'<div class="ic"><img src="'+ic+'"/></div>':'<div class="ic ph">'+PH+'</div>';
}
function tileName(item){
  if(item.t==='s'){var l=appByPkg(item.l),r=appByPkg(item.r);return (l?l.label:'?')+' | '+(r?r.label:'?');}
  var a=appByPkg(item.pkg);return a?a.label:item.pkg;
}

// ── 홈 그리드 렌더 ──
function renderHome(){
  var g=$('homegrid');g.innerHTML='';
  $('homehint').style.display=home.length?'none':'block';
  home.forEach(function(item,idx){
    var d=document.createElement('div');d.className='htile'+(item.t==='s'?'':'');d.dataset.idx=idx;
    d.innerHTML=tileIcHtml(item)+'<div class="nm">'+tileName(item)+'</div><div class="del">×</div>';
    bindHomeTile(d,item,idx);
    g.appendChild(d);
  });
}
// 전체 앱 서랍(DeX식) — 설치된 모든 앱. 탭=실행, 길게=홈으로 드래그. (우하단 ≡ 로 염)
function renderDrawer(){
  var g=$('drawerGrid');if(!g)return;g.innerHTML='';
  var q=($('appsearch').value||'').trim().toLowerCase();
  var list=q?apps.filter(function(a){return a.label.toLowerCase().indexOf(q)>=0;}):apps;
  if(!list.length){g.innerHTML='<div class="hint">앱 목록을 불러오는 중…</div>';return;}
  list.forEach(function(a){
    var t=document.createElement('div');t.className='dapp';t.dataset.pkg=a.pkg;
    var ic=iconSrc(a.icon);
    t.innerHTML=(ic?'<div class="ic"><img src="'+ic+'"/></div>':'<div class="ic ph">'+PH+'</div>')+'<div class="nm">'+a.label+'</div>';
    bindDrawerTile(t,a);
    g.appendChild(t);
  });
}
function openDrawer(){$('appsearch').value='';renderDrawer();$('drawer').classList.add('show');}
function closeDrawer(){$('drawer').classList.remove('show');}
function renderApps(){renderHome();renderSwitch();if($('drawer').classList.contains('show'))renderDrawer();}
var _renderT=null;
function renderAppsDebounced(){if(_renderT)return;_renderT=setTimeout(function(){_renderT=null;renderApps();},180);}

// ── 홈 아이템 실행 ──
function launchItem(item){
  if(item.t==='s'){launchSplit(item.l,item.r);return;}
  launch(item.pkg);
}
function launchSplit(l,r){
  recents=[l,r].concat(recents.filter(function(p){return p!==l&&p!==r}));

function launch(pkg){
  recents=[pkg].concat(recents.filter(function(p){return p!==pkg}));
  send('launch',{pkg:pkg});splitView=false;showVideo();renderSwitch();
}

// ── 최근앱 전환기 ──
function renderSwitch(){
  var g=$('switchGrid');if(!g)return;g.innerHTML='';
  if(!recents.length){g.innerHTML='<div class="hint">아직 실행한 앱이 없어요</div>';return;}
  recents.forEach(function(pkg){
    var a=appByPkg(pkg);if(!a)return;var ic=iconSrc(a.icon);
    var c=document.createElement('div');c.className='card';
    c.innerHTML='<div class="thumb">'+(ic?'<img src="'+ic+'"/>':PH)+'</div><div class="nm">'+a.label+'</div>';
    c.onclick=function(){launch(pkg);};
    g.appendChild(c);
  });
}
function openSwitcher(){renderSwitch();$('switcher').classList.add('show');$('desktop').classList.remove('show');}

// ── 편집 모드 ──
function setEdit(v){$('desktop').classList.toggle('edit',v);}
// 편집모드에서 아이콘 바깥 바탕 탭 → 편집 취소(캡처 단계: 타일/삭제버튼이면 통과)
$('desktop').addEventListener('pointerdown',function(e){
  if(!$('desktop').classList.contains('edit'))return;
  if(e.target&&e.target.classList&&e.target.classList.contains('del'))return;
  if(homeTileAt(e.clientX,e.clientY))return; // 아이콘 위면 타일 핸들러가 처리
  setEdit(false);
},true);

// ── 드래그 앤 드롭(독→홈 추가 / 합치기 / 홈 이동·삭제) ──
var drag=null; // {item, fromHomeIdx(or -1), ghost, moved}
function makeGhost(item,x,y){
  var g=document.createElement('div');g.className='ghost';
  g.innerHTML=tileIcHtml(item)+'<div class="nm">'+tileName(item)+'</div>';
  $('ghostlayer').appendChild(g);g.style.left=x+'px';g.style.top=y+'px';return g;
}
function startDrag(item,fromIdx,x,y){
  drag={item:item,fromHomeIdx:(fromIdx==null?-1:fromIdx),ghost:makeGhost(item,x,y),moved:false};
  if(fromIdx!=null){setEdit(true);$('trash').classList.add('show');}
  document.addEventListener('pointermove',onDragMove,true);
  document.addEventListener('pointerup',onDragUp,true);
  document.addEventListener('pointercancel',onDragUp,true);
}
function onDragMove(e){
  if(!drag)return;drag.moved=true;
  drag.ghost.style.left=e.clientX+'px';drag.ghost.style.top=e.clientY+'px';
  // 휴지통 핫존
  var overTrash=drag.fromHomeIdx>=0&&hit($('trash'),e.clientX,e.clientY);
  $('trash').classList.toggle('hot',!!overTrash);
  // 합치기 후보(독 드래그가 홈 앱 위)
  clearMergeHi();
  if(drag.item.t==='a'){
    var tgt=homeTileAt(e.clientX,e.clientY);
    if(tgt&&tgt.idx!==drag.fromHomeIdx&&home[tgt.idx]&&home[tgt.idx].t==='a')tgt.el.classList.add('merge');
  }
  e.preventDefault();
}
function clearMergeHi(){var els=$('homegrid').querySelectorAll('.htile.merge');for(var i=0;i<els.length;i++)els[i].classList.remove('merge');}
function hit(el,x,y){var r=el.getBoundingClientRect();return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;}
function homeTileAt(x,y){var els=$('homegrid').children;for(var i=0;i<els.length;i++){if(hit(els[i],x,y))return {el:els[i],idx:+els[i].dataset.idx};}return null;}
function insertIdxAt(x,y){
  var els=$('homegrid').children;
  for(var i=0;i<els.length;i++){var r=els[i].getBoundingClientRect();
    if(y<r.bottom&&x<r.left+r.width/2)return i;
    if(y<r.bottom&&x<r.right)return i+1;}
  return home.length;
}
function onDragUp(e){
  if(!drag)return;
  document.removeEventListener('pointermove',onDragMove,true);
  document.removeEventListener('pointerup',onDragUp,true);
  document.removeEventListener('pointercancel',onDragUp,true);
  var d=drag;drag=null;
  try{d.ghost.remove()}catch(_){}
  $('trash').classList.remove('show','hot');clearMergeHi();
  var x=e.clientX,y=e.clientY;
  if(d.fromHomeIdx>=0&&hit($('trash'),x,y)){home.splice(d.fromHomeIdx,1);saveHome();renderHome();return;}
  if(hit($('menufab'),x,y)){renderHome();return;}     // ≡ 버튼 위에 떨어뜨림 = 취소
  var inHome=hit($('homegrid'),x,y)||hit($('desktop'),x,y);
  // 합치기: 독(또는 다른 홈) 앱을 홈의 앱 위에 → 분할 아이콘(target=좌, dragged=우)
  if(d.item.t==='a'){
    var tgt=homeTileAt(x,y);
    if(tgt&&tgt.idx!==d.fromHomeIdx&&home[tgt.idx]&&home[tgt.idx].t==='a'){
      var leftPkg=home[tgt.idx].pkg, rightPkg=d.item.pkg;
      home[tgt.idx]={t:'s',l:leftPkg,r:rightPkg};
      if(d.fromHomeIdx>=0){var ri=d.fromHomeIdx; if(ri>tgt.idx)ri--; home.splice(d.fromHomeIdx,1);}
      saveHome();renderHome();return;
    }
  }
  if(inHome){
    var ins=insertIdxAt(x,y);
    if(d.fromHomeIdx>=0){var it=home.splice(d.fromHomeIdx,1)[0];if(ins>d.fromHomeIdx)ins--;home.splice(ins,0,it);}
    else{home.splice(ins,0,d.item);}
    saveHome();renderHome();return;
  }
  // 홈 밖에 떨어뜨림 → 변화 없음(독 드래그) / 제자리(홈 드래그)
  renderHome();
}

// 서랍 타일: 짧게탭=실행, 길게=서랍 닫고 홈으로 드래그
function bindDrawerTile(el,a){
  var lp=null,sx=0,sy=0,started=false;
  el.addEventListener('pointerdown',function(e){
    sx=e.clientX;sy=e.clientY;started=false;
    lp=setTimeout(function(){started=true;closeDrawer();startDrag({t:'a',pkg:a.pkg},null,e.clientX,e.clientY);},500);
  });
  el.addEventListener('pointermove',function(e){
    if(started)return;
    if(Math.abs(e.clientX-sx)>12||Math.abs(e.clientY-sy)>12){if(lp){clearTimeout(lp);lp=null;}}
  });
  el.addEventListener('pointerup',function(e){
    if(lp){clearTimeout(lp);lp=null;}
    if(!started&&Math.abs(e.clientX-sx)<12&&Math.abs(e.clientY-sy)<12){closeDrawer();launch(a.pkg);}
  });
  el.addEventListener('pointercancel',function(){if(lp){clearTimeout(lp);lp=null;}});
}
// 홈 타일: 짧게탭=실행, 길게=편집/드래그, ×버튼=삭제
function bindHomeTile(el,item,idx){
  var lp=null,sx=0,sy=0,started=false;
  el.addEventListener('pointerdown',function(e){
    if(e.target&&e.target.classList.contains('del')){home.splice(idx,1);saveHome();renderHome();e.stopPropagation();return;}
    sx=e.clientX;sy=e.clientY;started=false;
    lp=setTimeout(function(){started=true;startDrag(item,idx,e.clientX,e.clientY);},500);
  });
  el.addEventListener('pointermove',function(e){
    if(started)return;
    if(Math.abs(e.clientX-sx)>12||Math.abs(e.clientY-sy)>12){if(lp){clearTimeout(lp);lp=null;}}
  });
  el.addEventListener('pointerup',function(e){
    if(lp){clearTimeout(lp);lp=null;}
    if(started)return;
    if($('desktop').classList.contains('edit')){setEdit(false);return;}
    if(Math.abs(e.clientX-sx)<12&&Math.abs(e.clientY-sy)<12)launchItem(item);
  });
  el.addEventListener('pointercancel',function(){if(lp){clearTimeout(lp);lp=null;}});
}

// ── WebRTC ──
var splitView=false; // 현재(또는 진행중) 분할 화면 여부
var lastPanel=0;     // 마지막 만진 패널(뒤로키 라우팅)
var splitTrackCount=0;
var connectWatch=null,connTries=0;
function onConnected(){if(connected)return;connected=true;if(connectWatch){clearTimeout(connectWatch);connectWatch=null;}st('미러링 중');if(!appShowing())showHome();}
function armWatchdog(){
  if(connectWatch)clearTimeout(connectWatch);
  connectWatch=setTimeout(function(){
    if(connected)return;
    if(connTries<3){connTries++;st('재연결 '+connTries);resetForReconnect();}
    else{$('msg').textContent='연결 실패 — 네트워크/핫스팟 확인 후 재시도';$('panel').classList.remove('hidden');}
  },12000);
}
function ctrlSend(obj){if(ctrlDc&&ctrlDc.readyState==='open'){try{ctrlDc.send(JSON.stringify(obj));return true;}catch(_){}}return false;}
function sendKey(code){if(!ctrlSend({t:'key',code:code,d:lastPanel}))send('key',{code:code,d:lastPanel});}
function newPc(){
  pc=new RTCPeerConnection({iceServers:ICE});
  splitTrackCount=0;ctrlDc=null;
  pc.ondatachannel=function(e){ctrlDc=e.channel;};  // 폰이 만든 제어채널(터치/키 로컬 P2P)
  pc.ontrack=function(e){
    // 저지연: 수신 지터버퍼 최소화 → 영상 즉시 그려 터치 반응이 더 즉각적으로 느껴짐.
    try{if(e.receiver){e.receiver.jitterBufferTarget=0;e.receiver.playoutDelayHint=0;}}catch(_){}
    var mid=(e.transceiver&&e.transceiver.mid)||null;
    if(splitView){
      var right=(mid==='1')||(mid==null&&splitTrackCount===1);
      var ms=new MediaStream([e.track]);
      if(right)$('vidR').srcObject=ms; else $('vidL').srcObject=ms;
      splitTrackCount++;
      showSplit();
    }else{
      $('video').srcObject=e.streams[0]||new MediaStream([e.track]);
    }
  };
  pc.onicecandidate=function(e){if(e.candidate)send('ice',{from:'receiver',candidate:{candidate:e.candidate.candidate,sdpMid:e.candidate.sdpMid,sdpMLineIndex:e.candidate.sdpMLineIndex}})};
  pc.onconnectionstatechange=function(){var s=pc.connectionState;st('P2P:'+s);if(s==='connected')onConnected();else if(s==='failed'||s==='closed')resetForReconnect();};
  pc.oniceconnectionstatechange=function(){var s=pc.iceConnectionState;if(s==='connected'||s==='completed')onConnected();else if(s==='failed')resetForReconnect();};
}
var pendingIce=[],remoteSet=false,answered=false,lastGen=-1;
function resetForReconnect(){
  try{if(pc)pc.close()}catch(_){}
  pc=null;answered=false;remoteSet=false;pendingIce=[];connected=false;lastGen=-1;
  try{$('video').srcObject=null}catch(_){}
  $('video').style.display='none';$('splitwrap').classList.remove('show');$('desktop').classList.remove('show');$('drawer').classList.remove('show');taskbarHideAll();fabShow(false);
  $('panel').classList.remove('hidden');$('msg').textContent='폰과 연결 중…';
  startReady();
}
async function onOffer(p){
  var gen=(typeof p.gen==='number')?p.gen:0;
  if(answered&&gen===lastGen)return;            // 같은 offer 재전송 무시
  var renego=answered&&gen!==lastGen;            // 새 offer(분할 전환/재협상)
  lastGen=gen;
  try{
    if(renego){try{if(pc)pc.close()}catch(_){}pc=null;answered=false;remoteSet=false;pendingIce=[];}
    answered=true;
    splitView=!!p.split;
    if(splitView&&p.displays){splitDisp[0]=p.displays[0]||null;splitDisp[1]=p.displays[1]||null;}
    if(p.display){dispW=p.display.w||0;dispH=p.display.h||0;}
    if(!pc)newPc();
    await pc.setRemoteDescription({type:'offer',sdp:p.sdp.sdp});
    remoteSet=true;
    for(var i=0;i<pendingIce.length;i++){try{await pc.addIceCandidate(pendingIce[i])}catch(_){}}
    pendingIce=[];
    var a=await pc.createAnswer();await pc.setLocalDescription(a);
    send('answer',{from:'receiver',sdp:{type:'answer',sdp:a.sdp}});
    st('연결 중');armWatchdog();
  }catch(e){answered=false;$('msg').textContent='오류: '+e.message}
}
async function onIce(p){if(p.from==='receiver'||!p.candidate)return;if(!pc||!remoteSet){pendingIce.push(p.candidate);return;}try{await pc.addIceCandidate(p.candidate)}catch(_){}}
// 전체 앱 목록(라벨+pkg, 즉시) — 기존 아이콘 보존하며 교체.
function onApplist(p){if(!p||!p.apps)return;var prev={};apps.forEach(function(a){if(a.icon)prev[a.pkg]=a.icon;});
  apps=p.apps.map(function(a){return {label:a.label,pkg:a.pkg,icon:prev[a.pkg]||null};});renderApps();}
// 아이콘 청크(진행형) — 해당 앱에 채우고 디바운스 렌더.
function onIcons(p){if(!p||!p.icons)return;var idx={};apps.forEach(function(a,i){idx[a.pkg]=i;});
  p.icons.forEach(function(it){var i=idx[it.pkg];if(i!=null)apps[i].icon=it.icon;});renderAppsDebounced();}

// ── 분할 레이아웃(드래그 분할선) ──
var splitRatio=0.5;
function layoutSplit(){
  var wrap=$('splitwrap');var W=wrap.clientWidth,H=wrap.clientHeight,DV=16;
  var avail=W-DV;var lw=Math.round(avail*splitRatio);
  $('vidL').style.width=lw+'px';$('vidL').style.height=H+'px';
  $('vidR').style.width=(avail-lw)+'px';$('vidR').style.height=H+'px';
}
(function(){var sd=$('sdiv'),dragging=false;
  sd.addEventListener('pointerdown',function(e){dragging=true;e.preventDefault();e.stopPropagation();});
  document.addEventListener('pointermove',function(e){if(!dragging)return;var W=$('splitwrap').clientWidth||1;splitRatio=Math.max(0.2,Math.min(0.8,e.clientX/W));layoutSplit();});
  document.addEventListener('pointerup',function(){dragging=false;});
})();
window.addEventListener('resize',function(){if($('splitwrap').classList.contains('show'))layoutSplit();});

// ── 터치 → 디스플레이 픽셀 매핑 ──
function mapTouch(el,w,h,cx,cy){
  var r=el.getBoundingClientRect();var iw=w||el.videoWidth,ih=h||el.videoHeight;
  if(!iw||!ih||!r.width||!r.height)return null;
  var s=Math.min(r.width/iw,r.height/ih);var dw=iw*s,dh=ih*s;
  var ox=r.left+(r.width-dw)/2,oy=r.top+(r.height-dh)/2;
  var x=(cx-ox)/s,y=(cy-oy)/s;if(x<0||x>iw||y<0||y>ih)return null;return {x:x,y:y};
}
function touchSend(a,x,y,panel){
  // 로컬 P2P DataChannel 우선(저지연), 미연결 시 Supabase 폴백.
  if(!ctrlSend({t:'touch',a:a,x:x,y:y,d:panel}))send('touch',{a:a,x:x,y:y,d:panel});
}
function bindTouch(el,getDims,panel){
  var down=false,lastP=null,lastMove=0;el.style.touchAction='none';
  function dims(){return getDims();}
  el.addEventListener('pointerdown',function(e){down=true;lastPanel=panel;var dm=dims();var p=mapTouch(el,dm.w,dm.h,e.clientX,e.clientY);if(p){lastP=p;touchSend(0,p.x,p.y,panel);}e.preventDefault();});
  el.addEventListener('pointermove',function(e){if(!down)return;var now=Date.now();if(now-lastMove<16)return;lastMove=now;var dm=dims();var p=mapTouch(el,dm.w,dm.h,e.clientX,e.clientY);if(p){lastP=p;touchSend(2,p.x,p.y,panel);}});
  el.addEventListener('pointerup',function(e){down=false;var dm=dims();var p=mapTouch(el,dm.w,dm.h,e.clientX,e.clientY)||lastP;if(p)touchSend(1,p.x,p.y,panel);});
  el.addEventListener('pointercancel',function(){if(down&&lastP)touchSend(1,lastP.x,lastP.y,panel);down=false;});
}
bindTouch($('video'),function(){return {w:dispW,h:dispH}},0);
bindTouch($('vidL'),function(){return splitDisp[0]||{w:0,h:0}},0);
bindTouch($('vidR'),function(){return splitDisp[1]||{w:0,h:0}},1);

// 테슬라 브라우저 크롬 → 첫 탭 풀스크린(best-effort)
var fsTried=false;
function tryFullscreen(){if(fsTried)return;fsTried=true;var el=document.documentElement;var fn=el.requestFullscreen||el.webkitRequestFullscreen;if(fn){try{var r=fn.call(el);if(r&&r.catch)r.catch(function(){});}catch(_){}}}
document.addEventListener('pointerdown',tryFullscreen,{once:false});
// 브라우저 롱프레스 컨텍스트메뉴(이미지 저장/도움말)·드래그 차단
document.addEventListener('contextmenu',function(e){e.preventDefault();},true);
document.addEventListener('dragstart',function(e){e.preventDefault();},true);
var readyTimer=null;
function isLandscape(){try{if(window.matchMedia&&window.matchMedia('(orientation: landscape)').matches)return true;}catch(_){}try{var o=screen.orientation||screen.msOrientation||screen.mozOrientation;if(o&&typeof o.angle==='number'&&Math.abs(o.angle)%180===90)return true;if(o&&typeof o.type==='string'&&o.type.indexOf('landscape')>=0)return true;}catch(_){}return window.innerWidth>window.innerHeight;}
function vpSize(){var vv=window.visualViewport;var w=Math.round((vv&&vv.width)||window.innerWidth),h=Math.round((vv&&vv.height)||window.innerHeight);if(isLandscape()&&w<h){var t=w;w=h;h=t;}return {w:w,h:h};}
function readyMsg(){var d=Math.min(3,Math.max(1,window.devicePixelRatio||1));if(cal&&cal.w>40&&cal.h>40)return {w:cal.w,h:cal.h,dpr:d};var s=vpSize();return {w:s.w,h:s.h,dpr:d};}
function startReady(){if(readyTimer)return;send('ready',readyMsg());readyTimer=setInterval(function(){if(remoteSet){stopReady();return;}send('ready',readyMsg());},2000);}
function stopReady(){if(readyTimer){clearInterval(readyTimer);readyTimer=null;}}
var readyOrient=isLandscape(),readyOrientTimer=null;
function onReadyOrientChange(){if(readyOrientTimer)clearTimeout(readyOrientTimer);readyOrientTimer=setTimeout(function(){var cur=isLandscape();if(cur!==readyOrient){readyOrient=cur;send('ready',readyMsg());}},600);}
window.addEventListener('orientationchange',onReadyOrientChange);
if(window.visualViewport)window.visualViewport.addEventListener('resize',onReadyOrientChange);
async function connect(room){
  st('방 입장');$('status').style.display='block';
  $('changecode').style.display='block';$('calibrate').style.display='block';
  setTimeout(function(){$('changecode').style.display='none';$('calibrate').style.display='none';},10000);
  sb=window.supabase.createClient(SB_URL,SB_KEY,{realtime:{params:{eventsPerSecond:20}}});
  channel=sb.channel(room,{config:{broadcast:{self:false,ack:false}}});
  channel.on('broadcast',{event:'offer'},function(m){onOffer(m.payload)})
    .on('broadcast',{event:'ice'},function(m){onIce(m.payload)})
    .on('broadcast',{event:'applist'},function(m){onApplist(m.payload)})
    .on('broadcast',{event:'icons'},function(m){onIcons(m.payload)})
    .on('broadcast',{event:'app-launched'},function(){if(splitView)showSplit();else showVideo();})
    .on('broadcast',{event:'stats'},function(m){onStats(m.payload)})
    .subscribe(function(s){if(s==='SUBSCRIBED'){st('폰 대기 중');startReady();}else if(s==='CHANNEL_ERROR'){$('msg').textContent='연결 실패 — 재시도하세요'}});
}
function startWithCode(code){
  code=(code||'').replace(/[^a-zA-Z0-9]/g,'').slice(0,4).toUpperCase();
  if(!code)return;
  try{localStorage.setItem('tevue_code',code)}catch(_){}
  curCode=code;loadCal();loadHome();renderHome();
  $('codebox').style.display='none';$('dots').style.display='';$('msg').textContent='폰과 연결 중…';
  connect('tevue:'+code);
}
function showInput(){
  $('msg').textContent='폰 코드를 입력하세요';$('dots').style.display='none';$('codebox').style.display='';
  var inp=$('codeinput');try{inp.focus()}catch(_){}
  $('codebtn').onclick=function(){startWithCode(inp.value)};
  inp.onkeydown=function(e){if(e.key==='Enter')startWithCode(inp.value)};
}
$('changecode').onclick=function(){try{localStorage.removeItem('tevue_code')}catch(_){}location.reload();};

// ── 화면 보정(코너 2탭) — 단일 화면용 ──
var curCode='';
function calKey(){return 'tevue_cal_'+(curCode||'');}
function loadCal(){try{var s=localStorage.getItem(calKey());cal=s?JSON.parse(s):null;}catch(_){cal=null;}applyCal();}
function applyCal(){var v=$('video');if(cal&&cal.w>40&&cal.h>40){v.style.left=cal.x+'px';v.style.top=cal.y+'px';v.style.right='auto';v.style.bottom='auto';v.style.width=cal.w+'px';v.style.height=cal.h+'px';}else{v.style.left='';v.style.top='';v.style.right='';v.style.bottom='';v.style.width='';v.style.height='';}}
var calStep=0,calTL=null;
function clearDots(){var ds=document.querySelectorAll('.caldot');for(var i=0;i<ds.length;i++)ds[i].remove();}
function dot(x,y){var d=document.createElement('div');d.className='caldot';d.style.left=x+'px';d.style.top=y+'px';document.body.appendChild(d);}
function startCal(){calStep=1;calTL=null;clearDots();$('calbox').classList.add('show');$('calmsg').textContent='실제로 보이는 영역의\n① 좌측 상단 모서리를 탭';}
function endCal(){$('calbox').classList.remove('show');clearDots();calStep=0;}
$('calbox').addEventListener('pointerdown',function(e){
  if(calStep===0)return;
  if(e.target&&e.target.id==='calcancel'){endCal();return;}
  e.preventDefault();e.stopPropagation();
  if(calStep===1){calTL={x:e.clientX,y:e.clientY};dot(e.clientX,e.clientY);calStep=2;$('calmsg').textContent='② 우측 하단 모서리를 탭';}
  else if(calStep===2){
    var x1=Math.min(calTL.x,e.clientX),y1=Math.min(calTL.y,e.clientY);
    var w=Math.abs(e.clientX-calTL.x),h=Math.abs(e.clientY-calTL.y);
    if(w>60&&h>60){try{localStorage.setItem(calKey(),JSON.stringify({x:Math.round(x1),y:Math.round(y1),w:Math.round(w),h:Math.round(h)}));}catch(_){}}
    $('calmsg').textContent='보정 저장됨 — 다시 연결합니다…';setTimeout(function(){location.reload();},700);
  }
},true);
$('calcancel').onclick=endCal;
$('calibrate').onclick=startCal;
clock();setInterval(clock,15000);
(function(){
  var q=new URLSearchParams(location.search).get('r');
  var saved=null;try{saved=localStorage.getItem('tevue_code')}catch(_){}
  var code=(q||saved||'').trim().toUpperCase();
  if(code)startWithCode(code); else showInput();
})();
</script>
</body></html>
